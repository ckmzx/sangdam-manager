<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pass 인천송도센터 - 상담생 관리</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-light: #dcfce7;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--gray-50); color: var(--gray-900); }
    header {
      background: var(--primary);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header span { font-size: 0.8rem; opacity: 0.85; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* Stats */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      background: white; border-radius: 10px; padding: 14px 20px;
      flex: 1; min-width: 130px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.75rem; color: var(--gray-500); margin-top: 2px; }

    /* Bulk copy panel */
    .bulk-panel {
      background: white; border-radius: 10px; padding: 16px 20px;
      margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .bulk-panel h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--gray-700); }
    .bulk-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type=text] {
      flex: 1; min-width: 160px; padding: 9px 14px;
      border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.9rem; outline: none;
    }
    .toolbar input:focus { border-color: var(--primary); }
    select.filter-sel {
      padding: 9px 12px; border: 1px solid var(--gray-300);
      border-radius: 8px; font-size: 0.88rem; outline: none; background: white;
    }

    /* Buttons */
    .btn {
      padding: 9px 16px; border: none; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-purple { background: #7c3aed; color: white; }
    .btn-outline { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
    .btn-danger { background: #fee2e2; color: #b91c1c; border: none; }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; border-radius: 6px; }

    /* Grade sections */
    .section-label {
      font-size: 0.78rem; font-weight: 700; color: var(--gray-500);
      letter-spacing: 0.04em; margin: 20px 0 8px; padding-left: 4px;
    }
    .grade-block { margin-bottom: 28px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    thead tr { background: var(--gray-100); }
    th { padding: 11px 13px; text-align: left; font-size: 0.8rem; font-weight: 700; color: var(--gray-500); white-space: nowrap; }
    td { padding: 10px 13px; font-size: 0.87rem; border-top: 1px solid var(--gray-100); vertical-align: middle; }
    tr.registered { background: var(--success-light) !important; }
    tr.registered td { color: #166534; }
    .reg-checkbox { width: 17px; height: 17px; cursor: pointer; accent-color: var(--success); }
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 0.74rem; font-weight: 700;
    }
    .badge-3 { background: #fee2e2; color: #b91c1c; }
    .badge-2 { background: #fef9c3; color: #92400e; }
    .badge-1 { background: #dbeafe; color: #1d4ed8; }
    .phone-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .action-btns { display: flex; gap: 5px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 14px; padding: 28px 24px;
      width: 100%; max-width: 430px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 13px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--gray-700); margin-bottom: 4px; font-weight: 600; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.9rem; outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: white;
      padding: 10px 22px; border-radius: 99px;
      font-size: 0.88rem; opacity: 0;
      transition: all 0.25s; z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      th, td { padding: 8px 9px; font-size: 0.8rem; }
      .action-btns { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏃 Pass 인천송도센터 상담생 관리</h1>
  <span id="lastSaved"></span>
</header>

<div class="container">

  <!-- 통계 -->
  <div class="stats-bar">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">전체 상담생</div></div>
    <div class="stat-card"><div class="num" id="statReg">0</div><div class="label">등록 완료</div></div>
    <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">미등록</div></div>
    <div class="stat-card"><div class="num" id="statRate">0%</div><div class="label">등록률</div></div>
  </div>

  <!-- 일괄 번호 복사 -->
  <div class="bulk-panel">
    <h3>📋 일괄 번호 복사 (문자 발송용)</h3>
    <div class="bulk-buttons">
      <button class="btn btn-purple" onclick="bulkCopy('student','all')">📱 전체 학생 번호 복사</button>
      <button class="btn btn-purple" onclick="bulkCopy('parent','all')">👨‍👩‍👧 전체 부모님 번호 복사</button>
      <button class="btn btn-success" onclick="bulkCopy('student','unregistered')">📱 미등록 학생 번호 복사</button>
      <button class="btn btn-success" onclick="bulkCopy('parent','unregistered')">👨‍👩‍👧 미등록 부모님 번호 복사</button>
    </div>
  </div>

  <!-- 검색/필터 툴바 -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 이름, 학교로 검색..." oninput="renderAll()" />
    <select class="filter-sel" id="filterGrade" onchange="renderAll()">
      <option value="all">전체 학년</option>
      <option value="고3">고3 이상</option>
      <option value="고2">고2</option>
      <option value="고1">고1</option>
    </select>
    <select class="filter-sel" id="filterReg" onchange="renderAll()">
      <option value="all">전체</option>
      <option value="registered">등록 완료</option>
      <option value="unregistered">미등록</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">+ 신규 상담생 추가</button>
  </div>

  <!-- 테이블 영역 -->
  <div id="tableContainer"></div>

</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">신규 상담생 추가</h2>
    <div class="form-group">
      <label>이름 *</label>
      <input type="text" id="fName" placeholder="홍길동" />
    </div>
    <div class="form-group">
      <label>학교 *</label>
      <input type="text" id="fSchool" placeholder="○○고등학교" />
    </div>
    <div class="form-group">
      <label>학년 *</label>
      <select id="fGrade">
        <option value="고3">고3 이상</option>
        <option value="고2">고2</option>
        <option value="고1">고1</option>
      </select>
    </div>
    <div class="form-group">
      <label>본인 연락처</label>
      <input type="tel" id="fStudentPhone" placeholder="010-0000-0000" />
    </div>
    <div class="form-group">
      <label>부모님 연락처</label>
      <input type="tel" id="fParentPhone" placeholder="010-0000-0000" />
    </div>
    <div class="form-group">
      <label>메모</label>
      <input type="text" id="fMemo" placeholder="자유 메모" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveStudent()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_DATA = [
  {id:1,  name:"박주성", school:"인천하늘고", grade:"고3", studentPhone:"010-9082-9883", parentPhone:"010-6310-9883", registered:false, memo:""},
  {id:2,  name:"장형욱", school:"영등포공고", grade:"고3", studentPhone:"010-8187-4266", parentPhone:"010-6342-4266", registered:false, memo:""},
  {id:3,  name:"이유빈", school:"논현고",     grade:"고3", studentPhone:"010-9420-2038", parentPhone:"010-4370-3161", registered:false, memo:""},
  {id:4,  name:"이예은", school:"해송고",     grade:"고3", studentPhone:"010-7379-1251", parentPhone:"010-3823-8237", registered:false, memo:""},
  {id:5,  name:"김지호", school:"연송고",     grade:"고3", studentPhone:"010-6272-3669", parentPhone:"010-9171-3669", registered:false, memo:""},
  {id:6,  name:"원동현", school:"연수고",     grade:"고2", studentPhone:"010-9172-7209", parentPhone:"010-3809-7208", registered:false, memo:""},
  {id:7,  name:"전소현", school:"인천고잔고", grade:"고2", studentPhone:"010-3973-3150", parentPhone:"010-8617-3150", registered:false, memo:""},
  {id:8,  name:"홍지석", school:"연수고",     grade:"고2", studentPhone:"010-3149-9312", parentPhone:"010-2628-9312", registered:false, memo:""},
  {id:9,  name:"박준환", school:"대건고",     grade:"고2", studentPhone:"010-3169-4935", parentPhone:"010-2355-4935", registered:false, memo:""},
  {id:10, name:"박세빈", school:"학익여고",   grade:"고2", studentPhone:"010-3101-8651", parentPhone:"010-2667-8651", registered:false, memo:""},
  {id:11, name:"김주아", school:"인천여고",   grade:"고2", studentPhone:"010-9892-4439", parentPhone:"010-2937-4439", registered:false, memo:""},
  {id:12, name:"이유찬", school:"연수고",     grade:"고2", studentPhone:"010-5786-7753", parentPhone:"010-8349-7753", registered:false, memo:""},
  {id:13, name:"이예윤", school:"인천논현고", grade:"고2", studentPhone:"010-2969-6925", parentPhone:"",              registered:false, memo:""},
  {id:14, name:"정윤아", school:"옥련여고",   grade:"고2", studentPhone:"010-3053-2363", parentPhone:"010-3159-4673", registered:false, memo:""},
  {id:15, name:"고은서", school:"인천여고",   grade:"고2", studentPhone:"010-2598-5022", parentPhone:"010-2261-9022", registered:false, memo:""},
  {id:16, name:"김민우", school:"연송고",     grade:"고1", studentPhone:"010-4616-5433", parentPhone:"010-6286-5433", registered:false, memo:""}
];

let nextId = 17;
let students = [];
let editingId = null;

function loadData() {
  const raw = localStorage.getItem('passStudents_v1');
  if (raw) {
    const p = JSON.parse(raw);
    students = p.students || DEFAULT_DATA.map(s=>({...s}));
    nextId   = p.nextId   || (Math.max(...students.map(s=>s.id)) + 1);
  } else {
    students = DEFAULT_DATA.map(s=>({...s}));
    nextId   = 17;
  }
}

function saveData() {
  localStorage.setItem('passStudents_v1', JSON.stringify({students, nextId}));
  document.getElementById('lastSaved').textContent = '저장됨 ' + new Date().toLocaleTimeString('ko-KR');
}

function updateStats(data) {
  const total = data.length;
  const reg   = data.filter(s=>s.registered).length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statReg').textContent     = reg;
  document.getElementById('statPending').textContent = total - reg;
  document.getElementById('statRate').textContent    = total ? Math.round(reg/total*100)+'%' : '0%';
}

const GRADES    = ['고3','고2','고1'];
const GRADE_LBL = {'고3':'고3 이상','고2':'고2','고1':'고1'};
const GRADE_BDG = {'고3':'badge-3','고2':'badge-2','고1':'badge-1'};

function getFiltered() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const gf = document.getElementById('filterGrade').value;
  const rf = document.getElementById('filterReg').value;
  return students.filter(s => {
    const mQ = !q || s.name.includes(q) || s.school.includes(q);
    const mG = gf==='all' || s.grade===gf;
    const mR = rf==='all' || (rf==='registered'?s.registered:!s.registered);
    return mQ && mG && mR;
  });
}

function phoneCell(phone) {
  if (!phone) return '<span style="color:var(--gray-300)">-</span>';
  return `<div class="phone-cell">${phone}<button class="btn btn-outline btn-sm" onclick="copyOne('${phone}')">복사</button></div>`;
}

function renderAll() {
  const filtered = getFiltered();
  updateStats(filtered);
  const container = document.getElementById('tableContainer');
  container.innerHTML = '';

  let anyShown = false;
  GRADES.forEach(grade => {
    const list = filtered.filter(s=>s.grade===grade);
    if (!list.length) return;
    anyShown = true;

    const block = document.createElement('div');
    block.className = 'grade-block';
    block.innerHTML = `<div class="section-label">${GRADE_LBL[grade]} (${list.length}명)</div>`;

    const tbl = document.createElement('table');
    tbl.innerHTML = `<thead><tr>
      <th>등록</th><th>이름</th><th>학교</th><th>학년</th>
      <th>본인 연락처</th><th>부모님 연락처</th><th>메모</th><th>관리</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    list.forEach(s => {
      const tr = document.createElement('tr');
      if (s.registered) tr.classList.add('registered');
      tr.innerHTML = `
        <td><input type="checkbox" class="reg-checkbox" ${s.registered?'checked':''}
              onchange="toggleReg(${s.id},this.checked)" title="등록 완료 체크"></td>
        <td><strong>${s.name}</strong></td>
        <td>${s.school}</td>
        <td><span class="badge ${GRADE_BDG[s.grade]}">${s.grade}</span></td>
        <td>${phoneCell(s.studentPhone)}</td>
        <td>${phoneCell(s.parentPhone)}</td>
        <td style="color:var(--gray-500);font-size:0.8rem">${s.memo||''}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-outline btn-sm" onclick="openEditModal(${s.id})">✏️ 수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">🗑 삭제</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    block.appendChild(tbl);
    container.appendChild(block);
  });

  if (!anyShown) {
    container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--gray-500)">검색 결과가 없습니다.</div>';
  }
}

function toggleReg(id, checked) {
  const s = students.find(x=>x.id===id);
  if (!s) return;
  s.registered = checked;
  saveData(); renderAll();
  showToast(checked ? `✅ ${s.name} 등록 완료!` : `⬜ ${s.name} 미등록으로 변경`);
}

function bulkCopy(type, scope) {
  let list = scope==='unregistered' ? students.filter(s=>!s.registered) : students;
  const phones = list.map(s=>type==='student'?s.studentPhone:s.parentPhone).filter(p=>p&&p.trim());
  if (!phones.length) { showToast('복사할 번호가 없습니다.'); return; }
  navigator.clipboard.writeText(phones.join(','));
  showToast(`📋 ${type==='student'?'학생':'부모님'} ${phones.length}개 번호 복사 완료!`);
}

function copyOne(text) {
  navigator.clipboard.writeText(text);
  showToast('📋 복사되었습니다!');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '신규 상담생 추가';
  ['fName','fSchool','fStudentPhone','fParentPhone','fMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fGrade').value = '고3';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('fName').focus();
}

function openEditModal(id) {
  const s = students.find(x=>x.id===id); if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '학생 정보 수정';
  document.getElementById('fName').value         = s.name;
  document.getElementById('fSchool').value       = s.school;
  document.getElementById('fGrade').value        = s.grade;
  document.getElementById('fStudentPhone').value = s.studentPhone;
  document.getElementById('fParentPhone').value  = s.parentPhone;
  document.getElementById('fMemo').value         = s.memo;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveStudent() {
  const name   = document.getElementById('fName').value.trim();
  const school = document.getElementById('fSchool').value.trim();
  if (!name || !school) { alert('이름과 학교는 필수입니다.'); return; }
  if (editingId !== null) {
    const s = students.find(x=>x.id===editingId);
    s.name=name; s.school=school;
    s.grade        = document.getElementById('fGrade').value;
    s.studentPhone = document.getElementById('fStudentPhone').value.trim();
    s.parentPhone  = document.getElementById('fParentPhone').value.trim();
    s.memo         = document.getElementById('fMemo').value.trim();
    showToast('✅ 수정 완료!');
  } else {
    students.push({ id:nextId++, name, school,
      grade:        document.getElementById('fGrade').value,
      studentPhone: document.getElementById('fStudentPhone').value.trim(),
      parentPhone:  document.getElementById('fParentPhone').value.trim(),
      registered: false,
      memo:         document.getElementById('fMemo').value.trim()
    });
    showToast('✅ 신규 상담생 추가 완료!');
  }
  saveData(); closeModal(); renderAll();
}

function deleteStudent(id) {
  const s = students.find(x=>x.id===id); if (!s) return;
  if (!confirm(`'${s.name}' 학생을 삭제하시겠습니까?`)) return;
  students = students.filter(x=>x.id!==id);
  saveData(); renderAll();
  showToast(`🗑 ${s.name} 삭제 완료`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2300);
}

document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

loadData();
renderAll();
</script>
</body>
</html>
